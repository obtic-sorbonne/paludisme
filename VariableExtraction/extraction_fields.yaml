# =============================================================================
# extraction_fields.yaml
# System B — Qwen Q&A Field Definitions
#
# HOW TO ADD A NEW VARIABLE:
#   1. Add a new entry with the column name as the key
#   2. Write a plain-language question in French or English
#   3. Set the section (demographics / J0 / J0_lab / J3 / J3_lab /
#                       J30 / J30_lab / treatment)
#   4. Set the type (boolean / numeric / text / date)
#   5. Optional: add a hint for clarification
#
# That's it. No regex. No patterns. Just questions.
#
# FOR A NEW DISEASE (tuberculosis, dengue, HIV, etc.):
#   Replace the questions below with your disease-specific questions.
#   Keep the same section/type structure.
# =============================================================================

# ── Demographics & Travel ─────────────────────────────────────────────────────

Sexe:
  section: demographics
  type: text
  question: "What is the patient's biological sex? Answer M or F."
  hint: "Look for Sexe: M or F, or Né(e)"

Age:
  section: demographics
  type: numeric
  question: "What is the patient's age in YEARS as a decimal number? If age is given in months (e.g. '10 mois', '22m', '10m'), convert to years by dividing by 12 and rounding to 2 decimal places (e.g. 10 months = 0.83, 22 months = 1.83). If age is given in years with half (e.g. '5 ans et demi', '5 ans 1/2'), return as decimal (e.g. 5.5). Return number only."
  hint: "Look for Age: Xa, Age: Xm, enfant de X ans, X mois, X ans et demi"

Pays_de_naissance:
  section: demographics
  type: text
  question: "What is the patient's country of birth?"
  hint: "Look for Pays de naissance in the CNR form"

Date_départ_séjour:
  section: demographics
  type: date
  question: "What is the date the patient departed for the endemic zone? Format DD/MM/YYYY."

Date_retour_séjour:
  section: demographics
  type: date
  question: "What is the date the patient returned from the endemic zone? Format DD/MM/YYYY."
  hint: "Look for 'retour le', 'revenu le', 'rentré le', or CNR 'Date retour'"

Durée_zone_endémie:
  section: demographics
  type: text
  question: "How long did the patient stay in the endemic zone? Express as number of days, weeks, or months."
  hint: "e.g. '3 semaines', '45 jours', '2 mois'. If not explicitly stated, leave empty."

Lieu_séjour:
  section: demographics
  type: text
  question: "Which country or region did the patient travel to for the malaria exposure?"
  hint: "e.g. Côte d'Ivoire, Mali, Cameroun, Sénégal"

chimioprophylaxie:
  section: demographics
  type: text
  question: >
    What antimalarial prophylaxis drug did the patient take before or during
    the trip? Nivaquine=Chloroquine, Paludrine=Proguanil,
    Nivaquine/Paludrine=Chloroquine+Proguanil, Savarine=Chloroquine+Proguanil,
    Lariam=Mefloquine, Malarone=Atovaquone+Proguanil.
    Return the standardized name or empty string if no prophylaxis taken.
  hint: >
    Look for Nivaquine=Chloroquine, Lariam=Mefloquine,
    Savarine=Chloroquine+Proguanil, Malarone=Atovaquone+Proguanil.
    If patient took no prophylaxis or CNR says Non, answer empty string.

moustiquaire_imp:
  section: demographics
  type: boolean
  question: "Did the patient sleep under an impregnated mosquito net during their stay? Answer Oui, Non, or NSP if uncertain."
  hint: "Look for 'moustiquaire', 'ne dormait pas sous une moustiquaire' = Non. NSP if not mentioned."

palu_ant:
  section: demographics
  type: boolean
  question: "Does the patient have a history of prior malaria episodes (in the past 3 months or previously)?"
  hint: "'Antécédents de paludisme' = Oui. 'pas d'antécédent de palu' or 'ATCD=0' = Non."

date_premiers_symptomes:
  section: demographics
  type: date
  question: "What is the date of onset of the first symptoms of this malaria episode? Format DD/MM/YYYY."

# ── J0 — Admission Symptoms ───────────────────────────────────────────────────

fièvre_J0:
  section: J0
  type: boolean
  question: "Does the patient have fever at admission (J0)?"
  hint: "'fièvre', 'fébrile', 'Temp > 38°C' = Oui. 'apyrétique' = Non."

anorexie_J0:
  section: J0
  type: boolean
  question: "Does the patient have loss of appetite (anorexia) at admission?"
  hint: "'anorexie', 'refus alimentaire', 'ne mange pas' = Oui"

diarrhées_J0:
  section: J0
  type: boolean
  question: "Does the patient have diarrhea at or before admission? Look for 'diarrhée', 'selles liquides'."
  hint: "'diarrhée', 'selles liquides', 'selles molles' = Oui. 'pas de diarrhée' = Non."

vomissement_J0:
  section: J0
  type: boolean
  question: "Does the patient have vomiting at or before admission? Look for 'vomissements', 'vomit' in history or clinical exam."
  hint: "'vomissement', 'vomit' = Oui. 'pas de vomissement' = Non."

nausée_J0:
  section: J0
  type: boolean
  question: "Does the patient have nausea at admission?"

asthénie_J0:
  section: J0
  type: boolean
  question: "Does the patient have fatigue or asthenia at admission?"
  hint: "'asthénie', 'asthénique', 'fatigue' = Oui"

céphalées_J0:
  section: J0
  type: boolean
  question: "Does the patient have headaches at or before admission? Look for 'céphalées', 'maux de tête' in history or exam."
  hint: "'céphalées', 'maux de tête' = Oui. 'pas de céphalée' = Non."

douleurs_abdominales_J0:
  section: J0
  type: boolean
  question: "Does the patient have abdominal pain at admission?"
  hint: "'douleur abdominale', 'abdomen sensible' = Oui"

trouble_conscience_J0:
  section: J0
  type: boolean
  question: "Does the patient have altered consciousness or confusion at admission?"
  hint: "'trouble de conscience', 'confusion', 'obnubilation', 'syndrome confusionnel' = Oui"

convulsion_J0:
  section: J0
  type: boolean
  question: "Does the patient have convulsions at admission?"
  hint: "'convulsion' = Oui. 'pas de convulsion' = Non."

Poids_J0:
  section: J0
  type: numeric
  question: "What is the patient's weight in kg at admission?"
  hint: "Extract number only, e.g. '21' from 'Poids: 21 kg'"

Température_J0:
  section: J0
  type: numeric
  question: "What is the patient's temperature in °C at admission?"
  hint: "Extract number only, e.g. '38.6' from 'Temp: 38.6' or 'Température = 37°8'"

Fréquence_Cardiaque_J0:
  section: J0
  type: numeric
  question: "What is the patient's heart rate in beats per minute at admission?"
  hint: "Look for FC, Pouls, Fréquence cardiaque. Extract number only."

SaO2_J0:
  section: J0
  type: numeric
  question: "What is the patient's oxygen saturation (SaO2 or SpO2) in % at admission?"

Hépatomégalie_J0:
  section: J0
  type: boolean
  question: "Does the patient have hepatomegaly (enlarged liver) at admission?"
  hint: "'hépatomégalie', 'HPM', 'foie à X cm' = Oui. 'pas d'hépatomégalie', 'pas hsm', 'pas d'HM' = Non."

spénomégalie_J0:
  section: J0
  type: boolean
  question: "Does the patient have splenomegaly (enlarged spleen) at admission?"
  hint: "'splénomégalie', 'SMG', 'rate palpable' = Oui. 'pas de splénomégalie', 'pas hsm', 'pas de rate palpée' = Non."

pâleur_J0:
  section: J0
  type: boolean
  question: "Does the patient have pallor (pale skin or conjunctiva) at admission?"
  hint: "'pâleur cutanée', 'conjonctives pâles' = Oui. 'pas de pâleur', 'conjonctives bien colorées' = Non."

ictère_J0:
  section: J0
  type: boolean
  question: "Does the patient have jaundice (icterus) at admission?"
  hint: "'ictère', 'subictère', 'Ictere: oui' = Oui. 'pas d'ictère', 'non ictérique' = Non."

raideur_nuque_J0:
  section: J0
  type: boolean
  question: "Does the patient have neck stiffness (meningeal syndrome) at admission?"
  hint: "'raideur de nuque', 'raideur méningée', 'syndrome méningé' = Oui. 'nuque souple' = Non."

Goutte_épaisse_J0:
  section: J0
  type: text
  question: "Was a thick blood smear (goutte épaisse) performed at admission? Answer: Fait, Non fait, or Positif/Négatif if result known."

Frottis_sanguin_J0:
  section: J0
  type: boolean
  question: "Was the blood smear (frottis sanguin) positive for malaria parasites at admission?"
  hint: "'présence de trophozoïtes', 'positif', parasitemia mentioned = Oui. 'négatif', 'pas de parasites' = Non."

Parasitémie_J0:
  section: J0
  type: numeric
  question: "What is the parasitemia percentage at admission?"
  hint: "Extract number only, e.g. '3.6' from 'parasitémie: 3.6%' or 'parasitémie à 0.5%'"

HRP2_J0:
  section: J0
  type: boolean
  question: "Was the HRP2 rapid diagnostic test (antigénémie, bandelette) positive at admission?"
  hint: "'POSITIVE' near HRP2 or immunochromatographie = Oui. 'NEGATIVE' = Non. If not done = empty."

# ── J0 Lab Results ────────────────────────────────────────────────────────────

hémoglobine_J0:
  section: J0_lab
  type: numeric
  question: "What is the hemoglobin level in g/dl at admission (J0)?"
  hint: "Look for 'Hemoglobine' in lab results. Convert g/l to g/dl if needed (divide by 10 if value > 30)."

plaquettes_J0:
  section: J0_lab
  type: numeric
  question: "What is the platelet count in giga/l (or x10³/mm³) at admission (J0)?"
  hint: "Extract number only. e.g. '94' from 'PLAQUETTES: 94 10x3/mm3'"

globules_blancs_J0:
  section: J0_lab
  type: numeric
  question: "What is the white blood cell count in giga/l (or x10³/mm³) at admission (J0)?"
  hint: "Look for LEUCOCYTES. Extract number only."

ASAT_J0:
  section: J0_lab
  type: numeric
  question: "What is the ASAT (AST) value in UI/l at admission (J0)?"
  hint: "Look for ASAT in lab results or in narrative text like 'ASAT: 75'"

ALAT_J0:
  section: J0_lab
  type: numeric
  question: "What is the ALAT (ALT) value in UI/l at admission (J0)?"

bilirubine_J0:
  section: J0_lab
  type: numeric
  question: "What is the total bilirubin value in µmol/l at admission (J0)?"
  hint: "Look for 'Bilirubine Totale'"

Urée_J0:
  section: J0_lab
  type: numeric
  question: "What is the urea value in mmol/l at admission (J0)?"
  hint: "Look for 'Uree' or 'Urée'"

Créatinine_J0:
  section: J0_lab
  type: numeric
  question: "What is the creatinine value in µmol/l at admission (J0)?"

CRP_J0:
  section: J0_lab
  type: numeric
  question: "What is the CRP (C-reactive protein) value in mg/l at admission (J0)?"

PCT_J0:
  section: J0_lab
  type: numeric
  question: "What is the procalcitonin (PCT) value in µg/l at admission (J0)?"
  hint: "Look for 'Procalcitonine' in lab results"

# ── J3 — Follow-up ────────────────────────────────────────────────────────────

fièvre_J3:
  section: J3
  type: boolean
  question: "Does the patient have fever at the J3 follow-up visit?"
  hint: "'apyrétique', 'apyrexie', 'pas de fièvre', 'examen clinique normal' = Non. 'fébrile', 'fièvre' = Oui."

vomissement_J3:
  section: J3
  type: boolean
  question: "Does the patient have vomiting at J3?"
  hint: "'pas de vomissement', 'alimentation normale', 'mange bien' = Non."

diarrhées_J3:
  section: J3
  type: boolean
  question: "Does the patient have diarrhea at J3?"

nausée_J3:
  section: J3
  type: boolean
  question: "Does the patient have nausea at J3?"

anorexie_J3:
  section: J3
  type: boolean
  question: "Does the patient have loss of appetite at J3?"
  hint: "'mange bien', 'reprise de l'alimentation', 'bonne prise alimentaire' = Non."

asthénie_J3:
  section: J3
  type: boolean
  question: "Does the patient have fatigue at J3?"
  hint: "'bon état général', 'BEG', 'en pleine forme' = Non."

céphalées_J3:
  section: J3
  type: boolean
  question: "Does the patient have headaches at J3?"

douleurs_abdominales_J3:
  section: J3
  type: boolean
  question: "Does the patient have abdominal pain at J3?"
  hint: "'abdomen souple', 'pas de douleur abdominale' = Non."

spénomégalie_J3:
  section: J3
  type: boolean
  question: "Does the patient have splenomegaly at J3?"
  hint: "'pas de splénomégalie', 'pas hsm' = Non."

Poids_J3:
  section: J3
  type: numeric
  question: "What is the patient's weight in kg at J3?"

Température_J3:
  section: J3
  type: numeric
  question: "What is the patient's temperature in °C at J3?"

Frottis_sanguin_J3:
  section: J3
  type: boolean
  question: "Was the blood smear positive for malaria parasites at J3?"
  hint: "'négatif', 'pas de parasites', 'Absence' = Non. 'positif', 'trophozoïtes' = Oui."

hémoglobine_J3:
  section: J3_lab
  type: numeric
  question: "What is the hemoglobin in g/dl at J3?"

plaquettes_J3:
  section: J3_lab
  type: numeric
  question: "What is the platelet count in giga/l at J3?"

globules_blancs_J3:
  section: J3_lab
  type: numeric
  question: "What is the white blood cell count in giga/l at J3?"

ASAT_J3:
  section: J3_lab
  type: numeric
  question: "What is the ASAT value in UI/l at J3?"
  hint: "May appear in lab table or in narrative text like 'ASAT: 119'"

ALAT_J3:
  section: J3_lab
  type: numeric
  question: "What is the ALAT value in UI/l at J3?"

bilirubine_J3:
  section: J3_lab
  type: numeric
  question: "What is the total bilirubin in µmol/l at J3?"

