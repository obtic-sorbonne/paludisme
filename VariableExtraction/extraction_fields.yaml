# ── Treatment & Outcome ───────────────────────────────────────────────────────

Type_paludisme:
  section: treatment
  type: text
  question: "What Plasmodium species caused the malaria? e.g. P. falciparum, P. ovale, P. vivax, P. malariae."
  hint: "Look in the frottis result text or CNR form Espèce(s) field. Be precise — do not default to falciparum."

gravité_palu:
  section: treatment
  type: text
  question: "What is the severity of this malaria episode? Look for: 'accès grave', 'accès palustre grave', 'neuropaludisme', 'paludisme sévère', 'troubles de conscience', 'prostration', 'somnolence', 'propos incohérents' = grave. 'accès simple', 'sans signe de gravité' = simple. Answer grave or simple only."
  hint: "'neuropaludisme', 'accès grave', 'paludisme sévère', 'troubles de conscience' = grave. 'accès simple', 'sans signe de gravité' = simple."

Traitement_antipalu:
  section: treatment
  type: text
  question: "What antimalarial drugs were given to treat this malaria episode? Look for: Halfan, Halofantrine, Quinine, Malarone, Riamet, Lariam, Méfloquine. List ALL drugs mentioned as treatment (not prophylaxis). Example: 'Halofantrine (Halfan) puis Quinine IV'."
  hint: "e.g. 'Halofantrine (Halfan®)', 'Atovaquone + Proguanil (Malarone®)', 'Quinine IV'. Include all lines of treatment."

Durée_traitement:
  section: treatment
  type: numeric
  question: "How many days did the antimalarial treatment last?"

Perfusion:
  section: treatment
  type: boolean
  question: "Did the patient receive intravenous treatment (perfusion/IV)?"
  hint: "'Quinine IV', 'quinine intra-veineuse', 'voie veineuse' = Oui."

Hospitalisation:
  section: treatment
  type: boolean
  question: "Was the patient hospitalized?"
  hint: "'hospitalisé', 'UHCD', 'admission dans un service' = Oui."

Durée_hospit:
  section: treatment
  type: numeric
  question: "How many days was the patient hospitalized?"

type_service:
  section: treatment
  type: text
  question: "In which hospital service/ward was the patient treated?"
  hint: "e.g. URGENCES PEDIATRIQUES, PEDIATRIE GENERALE, REANIMATION"

ECG:
  section: treatment
  type: boolean
  question: "Was an ECG (electrocardiogram) performed?"
  hint: "'ECG', 'électrocardiogramme', 'QT corrigé' = Oui."